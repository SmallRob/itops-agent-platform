  - id: aiops_overview
    title: AIOps智能运维概述
    category: aiops
    tags: [aiops, 智能运维, ai, ml, 机器学习]
    summary: AIOps（人工智能运维）的核心概念、架构和实施方法
    content: |
      # AIOps智能运维概述

      ## 什么是AIOps
      AIOps（Artificial Intelligence for IT Operations）是将人工智能和机器学习技术应用于IT运维，实现自动化、智能化的运维管理。

      ## 核心能力
      1. **数据聚合**：收集和整合来自各种监控工具、日志、事件的数据
      2. **噪声过滤**：使用ML算法从海量告警中识别真正的问题信号
      3. **异常检测**：基于历史数据建立基线，检测异常行为
      4. **根因分析**：自动关联事件，定位问题根本原因
      5. **预测分析**：预测潜在问题，实现主动运维
      6. **自动修复**：基于预定义规则自动执行修复操作

      ## AIOps架构
      ```
      数据源 → 数据采集 → 数据处理 → ML分析 → 智能决策 → 自动执行
        │         │          │         │          │          │
      监控工具   Agent     清洗聚合   模型训练   告警路由   工作流
      日志系统   API       格式转换   异常检测   优先级    自动修复
      事件系统   Webhook   存储      根因分析   建议      通知
      ```

      ## 实施步骤
      1. **数据整合**：统一数据格式，建立数据湖
      2. **基线建立**：使用历史数据训练ML模型
      3. **规则配置**：定义告警规则和处理流程
      4. **自动化实现**：编写自动化脚本和工作流
      5. **持续优化**：基于反馈不断调整模型和规则

      ## 常用工具
      1. PagerDuty AIOps
      2. Moogsoft
      3. BigPanda
      4. Dynatrace
      5. Datadog

  - id: aiops_noise_reduction
    title: AIOps告警降噪最佳实践
    category: aiops
    tags: [aiops, 告警, 降噪, 去重, 聚合]
    summary: 如何使用AIOps技术减少告警噪声，提高告警质量
    content: |
      # AIOps告警降噪最佳实践

      ## 告警噪声问题
      现代IT环境每天产生数百万条告警，其中大部分是噪声：
      - 重复告警：同一问题触发多次告警
      - 瞬态告警：短暂异常后自动恢复
      - 关联告警：同一根因产生多个相关告警
      - 低优先级告警：不影响业务的告警

      ## 降噪策略
      1. **告警去重**
         - 基于时间窗口的去重
         - 基于告警内容的去重
         - 基于来源的去重

      2. **告警聚合**
         - 相似告警合并
         - 关联告警分组
         - 告警风暴识别

      3. **智能过滤**
         - 基于历史数据的学习
         - 基于业务影响的优先级
         - 基于时间的过滤

      4. **动态阈值**
         - 基于历史数据的基线
         - 季节性调整
         - 趋势预测

      ## 实施建议
      1. 建立告警分类标准
      2. 配置告警抑制规则
      3. 实现告警聚合逻辑
      4. 定期review告警规则
      5. 收集反馈持续优化

  - id: aiops_root_cause_analysis
    title: AIOps根因分析方法
    category: aiops
    tags: [aiops, rca, 根因分析, 故障定位]
    summary: 使用AIOps技术进行自动化根因分析
    content: |
      # AIOps根因分析方法

      ## 根因分析的重要性
      快速定位问题根因是减少MTTR（平均修复时间）的关键。传统方法依赖人工经验，效率低且容易遗漏。

      ## 根因分析方法
      1. **时间序列分析**
         - 事件时间线构建
         - 因果关系推断
         - 时间窗口关联

      2. **拓扑分析**
         - 服务依赖关系
         - 故障传播路径
         - 影响范围评估

      3. **日志分析**
         - 错误模式识别
         - 异常日志聚合
         - 关键词提取

      4. **指标分析**
         - 指标相关性分析
         - 异常检测
         - 趋势分析

      ## ML技术应用
      1. **聚类分析**：将相似的告警/日志聚类
      2. **关联规则**：发现事件之间的关联关系
      3. **决策树**：构建故障诊断决策树
      4. **深度学习**：复杂模式识别

      ## 工具推荐
      1. Elastic ML
      2. Datadog Watchdog
      3. Dynatrace Davis
      4. Moogsoft

