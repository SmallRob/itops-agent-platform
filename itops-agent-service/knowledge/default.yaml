  - id: sre_principles
    title: SRE核心原则与实践
    category: sre
    tags: [sre, 可靠性, sli, slo, 错误预算]
    summary: 站点可靠性工程（SRE）的核心原则和最佳实践
    content: |
      # SRE核心原则与实践

      ## 什么是SRE
      SRE（Site Reliability Engineering）是Google提出的运维方法论，用软件工程的方法解决运维问题。

      ## 核心原则
      1. **拥抱风险**
         - 100%可靠性不是目标
         - 使用错误预算管理风险
         - 平衡可靠性与迭代速度

      2. **服务等级目标（SLO）**
         - SLI：服务等级指标（可度量的指标）
         - SLO：服务等级目标（期望达到的目标）
         - SLA：服务等级协议（对外承诺）

      3. **消除繁琐工作**
         - 自动化重复性工作
         - 减少人工干预
         - 提高工程师效率

      4. **监控分布式系统**
         - 基于四个黄金信号：延迟、流量、错误、饱和度
         - 告警应该是可操作的
         - 避免告警疲劳

      ## 错误预算
      错误预算 = 1 - SLO目标
      例如：SLO为99.9%，则错误预算为0.1%

      错误预算的使用：
      - 新功能发布
      - 实验和创新
      - 维护窗口
      - 故障演练

      ## 最佳实践
      1. 建立SLO/SLI体系
      2. 实施错误预算策略
      3. 自动化on-call轮值
      4. 建立无指责的复盘文化
      5. 持续改进和学习

  - id: sre_incident_management
    title: SRE故障管理流程
    category: sre
    tags: [sre, 故障, incident, 响应, 复盘]
    summary: SRE故障管理的最佳实践和流程
    content: |
      # SRE故障管理流程

      ## 故障响应流程
      1. **检测**：监控系统发现异常
      2. **告警**：自动触发告警通知
      3. **响应**：on-call工程师响应
      4. **诊断**：快速定位问题
      5. **修复**：实施修复措施
      6. **恢复**：验证服务恢复
      7. **复盘**：总结经验教训

      ## On-Call最佳实践
      1. **轮值制度**
         - 合理的轮值周期
         - 明确的升级路径
         - 充分的培训准备

      2. **响应时间**
         - P0故障：5分钟内响应
         - P1故障：15分钟内响应
         - P2故障：1小时内响应

      3. **Playbook**
         - 预定义的处理流程
         - 常见问题的解决方案
         - 联系人和升级路径

      ## 故障复盘（Postmortem）
      复盘模板：
      1. 故障概述
      2. 时间线
      3. 根本原因
      4. 影响范围
      5. 修复措施
      6. 改进建议
      7. 行动项

      复盘原则：
      - 无指责文化
      - 关注系统改进
      - 跟踪行动项执行

