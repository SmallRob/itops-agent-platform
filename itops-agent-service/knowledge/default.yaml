  - id: backup_strategy
    title: 备份策略最佳实践
    category: best_practices
    tags: [backup, 备份, 灾难恢复, dr]
    summary: 企业级备份策略和灾难恢复最佳实践
    content: |
      # 备份策略最佳实践

      ## 备份类型
      1. 全量备份
      2. 增量备份
      3. 差异备份
      4. 快照备份

      ## 3-2-1备份原则
      - 3份数据副本
      - 2种不同存储介质
      - 1份异地备份

      ## 备份频率
      1. 数据库：每天全量，每小时增量
      2. 文件系统：每天增量，每周全量
      3. 配置文件：每次变更备份
      4. 应用代码：版本控制

      ## 恢复测试
      1. 定期恢复演练
      2. 验证备份完整性
      3. 记录恢复时间（RTO）
      4. 记录恢复点（RPO）

      ## 常用工具
      1. rsync
      2. restic
      3. borgbackup
      4. Velero（Kubernetes）

  - id: incident_response
    title: 故障响应流程
    category: best_practices
    tags: [incident, 故障, 应急响应, oncall]
    summary: 企业级故障响应和应急处理流程
    content: |
      # 故障响应流程

      ## 故障分级
      - P0（紧急）：核心业务中断
      - P1（严重）：重要功能异常
      - P2（一般）：非核心功能异常
      - P3（轻微）：体验问题

      ## 响应流程
      1. 故障发现（监控告警）
      2. 故障确认（值班人员）
      3. 故障升级（通知相关人员）
      4. 故障定位（排查原因）
      5. 故障修复（实施修复）
      6. 故障验证（确认恢复）
      7. 故障复盘（总结改进）

      ## On-Call最佳实践
      1. 轮值制度
      2. 升级机制
      3. 响应时间SLA
      4. 文档化流程

      ## 故障复盘模板
      1. 故障时间线
      2. 影响范围
      3. 根本原因
      4. 修复措施
      5. 改进建议

