  - id: chaos_engineering
    title: 混沌工程实践指南
    category: best_practices
    tags: [混沌工程, chaos, 故障注入, 韧性测试]
    summary: 混沌工程的核心概念、实验方法和工具
    content: |
      # 混沌工程实践指南

      ## 什么是混沌工程
      混沌工程是通过在生产环境中注入故障，验证系统韧性的方法论。

      ## 核心原则
      1. **建立稳态假设**
         - 定义系统正常行为
         - 建立可度量的指标
         - 确定稳态边界

      2. **引入真实故障**
         - 模拟真实世界的故障
         - 从最小影响开始
         - 逐步扩大范围

      3. **观察系统行为**
         - 监控关键指标
         - 记录系统响应
         - 分析偏差原因

      4. **验证和改进**
         - 验证假设是否成立
         - 识别薄弱环节
         - 实施改进措施

      ## 常见实验场景
      1. **基础设施**
         - 服务器宕机
         - 网络延迟/丢包
         - 磁盘故障

      2. **应用层**
         - 服务不可用
         - 响应延迟
         - 错误返回

      3. **依赖服务**
         - 数据库故障
         - 缓存失效
         - 第三方服务不可用

      ## 常用工具
      1. Chaos Monkey（Netflix）
      2. Litmus（Kubernetes）
      3. Chaos Mesh
      4. Gremlin
      5. AWS Fault Injection Simulator

      ## 实施建议
      1. 从非生产环境开始
      2. 建立回滚机制
      3. 逐步扩大范围
      4. 记录和分享经验
