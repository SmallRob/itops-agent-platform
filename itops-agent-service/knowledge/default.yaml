  - id: observability_overview
    title: 可观测性概述
    category: observability
    tags: [可观测性, observability, 监控, 指标, 日志, 链路追踪]
    summary: 可观测性的核心概念、三大支柱和实施方法
    content: |
      # 可观测性概述

      ## 什么是可观测性
      可观测性是通过系统的外部输出来理解其内部状态的能力。

      ## 三大支柱
      1. **指标（Metrics）**
         - 数值型时间序列数据
         - 用于监控系统状态
         - 例：CPU使用率、请求延迟、错误率

      2. **日志（Logs）**
         - 事件记录
         - 用于调试和审计
         - 例：应用日志、系统日志、访问日志

      3. **链路追踪（Traces）**
         - 请求在分布式系统中的完整路径
         - 用于分析性能瓶颈
         - 例：请求链路、服务依赖

      ## 可观测性vs监控
      - 监控：告诉你"什么"出了问题
      - 可观测性：告诉你"为什么"出了问题

      ## 实施方法
      1. **数据采集**
         - 应用埋点
         - Agent采集
         - 无侵入采集

      2. **数据存储**
         - 时序数据库（Prometheus、InfluxDB）
         - 日志系统（ELK、Loki）
         - 链路存储（Jaeger、Zipkin）

      3. **数据分析**
         - 查询分析
         - 告警规则
         - 可视化展示

      ## 常用工具
      1. Prometheus + Grafana（指标）
      2. ELK Stack（日志）
      3. Jaeger（链路追踪）
      4. OpenTelemetry（统一采集）

  - id: opentelemetry_guide
    title: OpenTelemetry实战指南
