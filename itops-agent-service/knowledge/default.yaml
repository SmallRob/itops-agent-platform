    title: Grafana仪表板设计指南
    category: observability
    tags: [grafana, 仪表板, dashboard, 可视化, 监控]
    summary: Grafana仪表板的设计原则和最佳实践
    content: |
      # Grafana仪表板设计指南

      ## 设计原则
      1. **简洁明了**：避免信息过载
      2. **层次分明**：从概览到详情
      3. **一致性**：统一风格和配色
      4. **可操作**：支持快速定位问题

      ## 仪表板类型
      1. **概览仪表板**
         - 系统整体状态
         - 关键指标汇总
         - 告警状态

      2. **服务仪表板**
         - 服务健康状态
         - 性能指标
         - 错误分析

      3. **基础设施仪表板**
         - 主机资源使用
         - 网络状态
         - 存储状态

      ## 常用面板
      1. **Stat**：单值显示
      2. **Gauge**：仪表盘
      3. **Graph**：时间序列图
      4. **Table**：表格数据
      5. **Heatmap**：热力图

      ## 最佳实践
      1. 使用变量支持多环境
      2. 配置合理的刷新间隔
      3. 设置告警阈值
      4. 添加注释说明
      5. 定期review和优化

      ## 常用PromQL
      ```promql
      # CPU使用率
      100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)

      # 内存使用率
      (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100

      # 请求错误率
      rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) * 100
      ```

