articles:
  - id: cpu_high
    title: CPU使用率过高排查指南
    category: troubleshooting
    tags: [cpu, 性能, 排查]
    summary: 本文介绍如何系统性地排查和解决CPU使用率过高的问题
    content: |
      # CPU使用率过高排查指南

      ## 常见原因
      1. 进程异常占用
      2. 死循环或无限递归
      3. 资源争用
      4. 僵尸进程

      ## 排查步骤
      1. 使用 `top` 或 `htop` 查看CPU占用最高的进程
      2. 使用 `ps aux --sort=-%cpu` 排序查看
      3. 检查是否有异常进程
      4. 分析进程堆栈

      ## 常用命令
      ```bash
      # 查看CPU使用情况
      top -bn1 | head -20

      # 查看CPU占用最高的进程
      ps aux --sort=-%cpu | head -10

      # 查看进程树
      pstree -p

      # 查看特定进程的线程
      ps -T -p <pid>
      ```

      ## 解决方案
      1. 优化代码逻辑
      2. 增加CPU资源
      3. 配置资源限制
      4. 重启异常进程

  - id: memory_leak
    title: 内存泄漏分析与解决
    category: troubleshooting
    tags: [memory, 内存, oom]
    summary: 本文介绍内存泄漏的常见场景、分析工具和解决方案
    content: |
      # 内存泄漏分析与解决

      ## 常见原因
      1. 应用内存泄漏
      2. 内存分配过多
      3. 缓存未清理
      4. 连接未释放

      ## 排查步骤
      1. 使用 `free -m` 查看内存使用情况
      2. 使用 `top` 或 `ps` 查看内存占用最高的进程
      3. 检查应用日志中的OOM错误
      4. 使用内存分析工具

      ## 常用命令
      ```bash
      # 查看内存使用情况
      free -m

      # 查看内存占用最高的进程
      ps aux --sort=-%mem | head -10

      # 查看OOM Killer日志
      dmesg | grep -i oom

      # 查看进程内存映射
      cat /proc/<pid>/smaps
      ```

      ## 解决方案
      1. 修复内存泄漏代码
      2. 增加物理内存
      3. 配置swap空间
      4. 优化内存使用

  - id: disk_full
    title: 磁盘空间不足处理
    category: troubleshooting
    tags: [disk, 磁盘, 存储]
    summary: 本文介绍磁盘空间不足的排查和解决方法
    content: |
      # 磁盘空间不足处理

      ## 常见原因
      1. 日志文件过大
      2. 临时文件积累
      3. 数据文件增长
      4. 备份文件过多

      ## 排查步骤
      1. 使用 `df -h` 查看各分区使用情况
      2. 使用 `du -sh` 定位大目录
      3. 查找大文件
      4. 检查日志轮转配置

      ## 常用命令
      ```bash
      # 查看磁盘使用情况
      df -h

      # 查看当前目录大小
      du -sh *

      # 查找大文件
      find / -type f -size +100M 2>/dev/null

      # 查看日志文件大小
      ls -lh /var/log/
      ```

      ## 解决方案
      1. 清理过期日志
      2. 配置日志轮转
      3. 清理临时文件
      4. 扩容磁盘空间

  - id: service_down
    title: 服务宕机处理
    category: troubleshooting
    tags: [service, 服务, 宕机]
    summary: 本文介绍服务宕机的排查和恢复方法
    content: |
      # 服务宕机处理

      ## 常见原因
      1. 进程异常退出
      2. 配置错误
      3. 依赖服务故障
      4. 资源不足

      ## 排查步骤
      1. 检查服务状态
      2. 查看服务日志
      3. 检查配置文件
      4. 检查依赖服务

      ## 常用命令
      ```bash
      # 检查服务状态
      systemctl status <service>

      # 查看服务日志
      journalctl -u <service> -n 100

      # 检查服务端口
      netstat -tlnp | grep <port>

      # 重启服务
      systemctl restart <service>
      ```

      ## 解决方案
      1. 修复配置错误
      2. 解决依赖问题
      3. 增加资源配额
      4. 配置自动重启

  - id: network_issue
    title: 网络故障排查
    category: troubleshooting
    tags: [network, 网络, 连接]
    summary: 本文提供网络故障的系统性排查流程
    content: |
      # 网络故障排查

      ## 常见原因
      1. 网卡故障
      2. 路由问题
      3. 防火墙规则
      4. DNS解析问题

      ## 排查步骤
      1. 检查网卡状态
      2. 测试网络连通性
      3. 检查路由表
      4. 检查防火墙规则

      ## 常用命令
      ```bash
      # 查看网卡状态
      ip addr show

      # 测试网络连通性
      ping -c 4 <host>

      # 查看路由表
      ip route show

      # 查看防火墙规则
      iptables -L -n

      # 查看DNS配置
      cat /etc/resolv.conf
      ```

      ## 解决方案
      1. 修复网卡配置
      2. 调整路由规则
      3. 修改防火墙规则
      4. 配置DNS服务器

