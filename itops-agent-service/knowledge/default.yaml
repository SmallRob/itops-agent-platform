    summary: 使用Ansible实现运维自动化
    content: |
      # Ansible自动化运维

      ## 核心概念
      1. Inventory（主机清单）
      2. Playbook（剧本）
      3. Module（模块）
      4. Role（角色）

      ## 常用模块
      1. command/shell - 执行命令
      2. copy - 复制文件
      3. template - 模板渲染
      4. service - 服务管理
      5. yum/apt - 包管理
      6. user - 用户管理

      ## Playbook示例
      ```yaml
      - hosts: webservers
        become: yes
        tasks:
          - name: Install nginx
            yum:
              name: nginx
              state: present
          
          - name: Start nginx
            service:
              name: nginx
              state: started
              enabled: yes
      ```

      ## 最佳实践
      1. 使用Role组织代码
      2. 版本控制Playbook
      3. 测试环境验证
      4. 幂等性设计

