  - id: docker_troubleshooting
    title: Docker容器故障排查
    category: troubleshooting
    tags: [docker, 容器, kubernetes, k8s]
    summary: Docker容器常见故障的排查和解决方法
    content: |
      # Docker容器故障排查

      ## 常见问题
      1. 容器无法启动
      2. 容器频繁重启
      3. 容器网络不通
      4. 容器资源不足

      ## 排查步骤
      1. 查看容器状态和日志
      2. 检查容器配置
      3. 检查宿主机资源
      4. 检查网络配置

      ## 常用命令
      ```bash
      # 查看容器状态
      docker ps -a

      # 查看容器日志
      docker logs <container_id>

      # 进入容器调试
      docker exec -it <container_id> /bin/bash

      # 查看容器资源使用
      docker stats <container_id>

      # 检查容器网络
      docker network inspect <network_name>

      # 重启容器
      docker restart <container_id>
      ```

      ## 解决方案
      1. 检查Dockerfile和docker-compose配置
      2. 增加容器资源限制
      3. 配置健康检查
      4. 使用容器编排工具（Kubernetes）

  - id: kubernetes_troubleshooting
    title: Kubernetes集群故障排查
    category: troubleshooting
    tags: [kubernetes, k8s, 集群, pod]
    summary: Kubernetes集群常见故障的排查方法
    content: |
      # Kubernetes集群故障排查

      ## Pod相关问题
      1. Pod处于Pending状态
      2. Pod处于CrashLoopBackOff状态
      3. Pod无法调度
      4. Pod网络不通

      ## 常用命令
      ```bash
      # 查看Pod状态
      kubectl get pods -A

      # 查看Pod详情
      kubectl describe pod <pod_name>

      # 查看Pod日志
      kubectl logs <pod_name>

      # 进入Pod调试
      kubectl exec -it <pod_name> -- /bin/bash

      # 查看事件
      kubectl get events --sort-by=.metadata.creationTimestamp

      # 查看节点状态
      kubectl get nodes
      kubectl describe node <node_name>
      ```

      ## Service相关问题
      1. Service无法访问
      2. Endpoints为空
      3. 负载均衡不生效

      ## 排查流程
      1. 检查Pod状态和日志
      2. 检查Service配置
      3. 检查网络策略
      4. 检查资源配额

  - id: nginx_troubleshooting
    title: Nginx故障排查
    category: troubleshooting
    tags: [nginx, 反向代理, 负载均衡, web服务器]
    summary: Nginx常见故障的排查和解决方法
    content: |
      # Nginx故障排查

      ## 常见问题
      1. 502 Bad Gateway
      2. 504 Gateway Timeout
      3. 413 Request Entity Too Large
      4. 配置语法错误

      ## 排查步骤
      1. 检查Nginx配置语法
      2. 查看Nginx错误日志
      3. 检查上游服务状态
      4. 检查系统资源

      ## 常用命令
      ```bash
      # 检查配置语法
      nginx -t

      # 查看错误日志
      tail -f /var/log/nginx/error.log

      # 重新加载配置
      nginx -s reload

      # 查看Nginx状态
      systemctl status nginx

      # 测试配置
      nginx -T
      ```

      ## 常见配置问题
      1. worker_processes设置不当
      2. keepalive_timeout配置不合理
      3. proxy_buffer_size太小
      4. SSL证书配置错误

  - id: mysql_troubleshooting
    title: MySQL数据库故障排查
    category: troubleshooting
    tags: [mysql, 数据库, 性能优化]
    summary: MySQL数据库常见故障的排查和优化方法
    content: |
      # MySQL数据库故障排查

      ## 性能问题
      1. 慢查询
      2. 连接数过多
      3. 锁等待
      4. 内存使用过高

      ## 常用命令
      ```bash
      # 查看进程列表
      SHOW PROCESSLIST;

      # 查看慢查询
      SHOW VARIABLES LIKE 'slow_query_log';
      SHOW VARIABLES LIKE 'long_query_time';

      # 查看表状态
      SHOW TABLE STATUS;

      # 查看索引使用情况
      SHOW INDEX FROM <table_name>;

      # 分析查询
      EXPLAIN <query>;
      ```

      ## 优化建议
      1. 优化SQL查询
      2. 添加合适的索引
      3. 配置查询缓存
      4. 调整内存参数

      ## 备份恢复
      ```bash
      # 备份数据库
      mysqldump -u root -p <database> > backup.sql

      # 恢复数据库
      mysql -u root -p <database> < backup.sql
      ```

