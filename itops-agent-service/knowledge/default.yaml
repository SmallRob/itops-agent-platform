    content: |
      # CI/CD流水线最佳实践

      ## 流水线阶段
      1. 代码检出
      2. 代码检查（Lint）
      3. 单元测试
      4. 构建打包
      5. 集成测试
      6. 部署预发
      7. 验收测试
      8. 部署生产

      ## 常用工具
      1. Jenkins
      2. GitLab CI
      3. GitHub Actions
      4. ArgoCD

      ## 最佳实践
      1. 小批量频繁提交
      2. 自动化测试覆盖
      3. 快速反馈循环
      4. 蓝绿部署/金丝雀发布
      5. 回滚机制

      ## 安全考虑
      1. 代码扫描
      2. 依赖检查
      3. 镜像扫描
      4. 密钥管理

