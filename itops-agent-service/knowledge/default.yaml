    summary: OpenTelemetry的核心概念、架构和使用方法
    content: |
      # OpenTelemetry实战指南

      ## 什么是OpenTelemetry
      OpenTelemetry是CNCF的可观测性框架，提供统一的API、SDK和工具来采集遥测数据。

      ## 核心组件
      1. **API**：定义如何生成遥测数据
      2. **SDK**：API的实现，提供配置和处理
      3. **Collector**：接收、处理和导出数据
      4. **Instrumentation**：自动/手动埋点

      ## 数据类型
      1. **Traces**：请求链路
      2. **Metrics**：指标数据
      3. **Logs**：日志数据

      ## Collector架构
      ```
      Receivers → Processors → Exporters
          │           │           │
        接收数据     处理数据     导出数据
      ```

      ## 使用场景
      1. 分布式链路追踪
      2. 应用性能监控
      3. 服务依赖分析
      4. 错误定位

      ## 最佳实践
      1. 使用自动埋点减少代码侵入
      2. 合理设置采样率
      3. 统一数据格式
      4. 选择合适的后端存储

  - id: prometheus_best_practices
    title: Prometheus监控最佳实践
    category: observability
    tags: [prometheus, 监控, 指标, 告警, grafana]
    summary: Prometheus的核心概念、配置和最佳实践
    content: |
      # Prometheus监控最佳实践

      ## 核心概念
      1. **数据模型**：时间序列 = 指标名 + 标签 + 值 + 时间戳
      2. **指标类型**：Counter、Gauge、Histogram、Summary
      3. **PromQL**：强大的查询语言

      ## 架构组件
      1. **Prometheus Server**：核心服务器
      2. **Exporters**：指标导出器
      3. **Pushgateway**：短期任务推送
      4. **Alertmanager**：告警管理

      ## 命名规范
      ```
      <namespace>_<subsystem>_<name>_<unit>
      ```
      示例：
      - http_requests_total
      - node_cpu_seconds_total
      - process_resident_memory_bytes

      ## 告警规则
      ```yaml
      groups:
        - name: example
          rules:
            - alert: HighErrorRate
              expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: "High error rate detected"
      ```

      ## Grafana集成
      1. 配置Prometheus数据源
      2. 创建Dashboard
      3. 设置告警规则
      4. 配置通知渠道

      ## 性能优化
      1. 合理设置采集间隔
      2. 使用Recording Rules
      3. 配置合适的存储策略
      4. 使用联邦集群

  - id: elk_stack_guide
    title: ELK Stack日志分析指南
    category: observability
    tags: [elk, elasticsearch, logstash, kibana, 日志]
    summary: ELK Stack的核心概念、架构和使用方法
    content: |
      # ELK Stack日志分析指南

      ## 什么是ELK Stack
      ELK是Elasticsearch + Logstash + Kibana的组合，用于日志收集、存储和分析。

      ## 组件介绍
      1. **Elasticsearch**
         - 分布式搜索引擎
         - 实时数据分析
         - 水平扩展

      2. **Logstash**
         - 数据收集引擎
         - 数据转换处理
         - 多种输入输出支持

      3. **Kibana**
         - 数据可视化平台
         - 仪表板创建
         - 日志查询分析

      ## 架构模式
      ```
      应用 → Filebeat → Logstash → Elasticsearch → Kibana
                                ↑
                              Redis/Kafka（可选缓冲）
      ```

      ## 最佳实践
      1. **日志格式**
         - 使用JSON格式
         - 统一字段命名
         - 包含必要上下文

      2. **索引管理**
         - 按时间分索引
         - 配置ILM策略
         - 定期清理旧数据

      3. **性能优化**
         - 合理分片策略
         - 使用索引别名
         - 配置缓存

      4. **安全配置**
         - 启用X-Pack安全
         - 配置访问控制
         - 加密通信

