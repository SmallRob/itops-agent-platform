      4. 清理内存缓存

      ## 磁盘I/O调优
      1. 选择合适的文件系统
      2. 调整I/O调度器
      3. 使用SSD优化
      4. 配置RAID级别

      ## 网络调优
      1. 调整TCP参数
      2. 优化网络缓冲区
      3. 配置负载均衡
      4. 使用CDN加速

      ## 监控工具
      1. vmstat
      2. iostat
      3. sar
      4. perf

  - id: ansible_automation
    title: Ansible自动化运维
    category: automation
    tags: [ansible, 自动化, 配置管理, playbook]
    summary: 使用Ansible实现运维自动化
    content: |
      # Ansible自动化运维

      ## 核心概念
      1. Inventory（主机清单）
      2. Playbook（剧本）
      3. Module（模块）
      4. Role（角色）

      ## 常用模块
      1. command/shell - 执行命令
      2. copy - 复制文件
      3. template - 模板渲染
      4. service - 服务管理
      5. yum/apt - 包管理
      6. user - 用户管理

      ## Playbook示例
      ```yaml
      - hosts: webservers
        become: yes
        tasks:
          - name: Install nginx
            yum:
              name: nginx
              state: present
          
          - name: Start nginx
            service:
              name: nginx
              state: started
              enabled: yes
      ```

      ## 最佳实践
      1. 使用Role组织代码
      2. 版本控制Playbook
      3. 测试环境验证
      4. 幂等性设计

  - id: terraform_infrastructure
    title: Terraform基础设施即代码
    category: automation
    tags: [terraform, iac, 基础设施, 云原生]
    summary: 使用Terraform管理云基础设施
    content: |
      # Terraform基础设施即代码

      ## 核心概念
      1. Provider（提供商）
      2. Resource（资源）
      3. State（状态）
      4. Module（模块）

      ## 常用命令
      ```bash
      # 初始化
      terraform init

      # 计划变更
      terraform plan

      # 应用变更
      terraform apply

      # 销毁资源
      terraform destroy

      # 查看状态
      terraform show
      ```

      ## 最佳实践
